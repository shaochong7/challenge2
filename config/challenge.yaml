# RoboVerse University team — tune for arena day

# UWB anchor coverage — MEASURE in the arena on competition day.
# Flight is blocked/restricted outside this region (bad UWB -> erratic flight).
arena:
  geofence_enabled: true
  safety_margin_m: 0.5   # inset from edges for waypoints/search targets
  # Rough arena size: y/North about 10 m, x/East about 5 m.
  # Assumes the UWB origin is near one corner; adjust onsite from actual UWB readings.
  uwb_bounds: { n_min: 0.0, n_max: 10.0, e_min: 0.0, e_max: 5.0 }

mapping_drone:
  serial_address: "serial:///dev/ttyS6:921600"
  # Mapping flight height. 2.0 m keeps markers large; verify obstacle clearance onsite.
  takeoff_height_m: 2.0
  # UWB ROS2 topic (from organizer stack)
  uwb_topic: "uwb_tag"
  # Down-facing RealSense (D430 or D450). Resolution is configurable on the unit;
  # use a high resolution so ArUco markers remain crisp in the labelled output.
  camera_model: "D430"        # D430 | D450 (sets field-of-view for footprint math)
  camera_width: 1280
  camera_height: 720
  camera_fps: 30
  # Camera intrinsics: leave null to read from RealSense at runtime
  fx: null
  fy: null
  cx: null
  cy: null
  # ArUco dictionary must match printed markers (confirm with organizers)
  aruco_dictionary: "DICT_7X7_1000"
  # Printed marker is 20 cm x 20 cm — enables pose fallback when depth has holes.
  marker_size_m: 0.20
  # Valid IDs can change; the detector still reports every ArUco ID it sees.
  valid_marker_ids: [11, 45, 51, 67, 101]
  invalid_marker_ids: []
  # Auto full-area survey: generate a lawnmower grid covering the whole anchor
  # safe-zone (uwb_bounds inset by safety_margin_m) so the drone maps everything.
  auto_survey: true
  survey_spacing_m: 1.2   # tighter spacing for ~2 m flight height and overlap
  # Fallback manual waypoints (used when auto_survey is false), UWB N/E meters.
  survey_waypoints:
    - { n: 0.0, e: 0.0 }
    - { n: 1.0, e: 0.0 }
    - { n: 1.0, e: 1.0 }
    - { n: 0.0, e: 1.0 }
  hover_at_waypoint_s: 2.0

navigation:
  # Mapping drone P-controller. BRIEF RULE: max speed 0.3 m/s for the mapping drone,
  # so the horizontal/vertical velocity caps are clamped to 0.3. (The swarm overrides
  # its own cap to swarm.move_speed — see swarm_core.)
  kp_xy: 0.1
  kp_z: 0.1
  max_vel_xy: 0.3          # mapping drone max horizontal speed (m/s) — brief limit
  max_vel_z: 0.3           # mapping drone max vertical speed (m/s)
  max_hover_xy: 0.15
  max_hover_z: 0.10
  n_threshold: 0.1
  e_threshold: 0.1
  d_threshold: 0.1
  hover_deadband: 0.03

swarm:
  listen_seconds: 5
  plane_ids: [1, 2, 3]
  selected_landing_marker_ids: [11, 45, 51]  # choose 3 out of the 5 valid landing zones
  # UWB on C2 (organizer UWBParserThread.py) — tag ID per drone, same order as plane_ids
  tag_ids: [0, 1, 2]
  uwb_serial_port: null   # null = auto-detect USB COM port
  uwb_baud_rate: 921600
  # Align raw UWB parser coordinates to the active cage.
  # Cage 1: x=0.0, y=0.0 | Cage 2: x=5.5, y=0.0 | Cage 3: x=5.5, y=5.5
  uwb_origin_x: 0.0
  uwb_origin_y: 0.0
  uwb_nav_timeout_s: 120
  waypoint_threshold_m: 0.12  # how close UWB must be to count a waypoint reached
  min_move_speed: 0.05        # floor so P-controller never stalls above threshold
  # Per-drone state machine timings (seconds)
  takeoff_wait_s: 5
  pad_land_wait_s: 1.0       # pause after landing on mapped pad before taking off to search
  wait_for_search_release: true
  search_release_key: "e"     # after all drones land on pads, press e to start search
  auto_release_search_in_sim: true
  max_mission_time_s: null    # null = no automatic mission time cap
  move_speed: 0.5             # BRIEF RULE: HULA max speed 0.5 m/s (assumes pyhulax
                              # move() speed is m/s — VERIFY units on the test drone)
  search_move_speed: 0.3      # slower search speed improves ArUco detection reliability
  hover_height_m: 0.9         # target HULA hover height for ground ArUco detection
  hover_height_max_m: 0.9     # cap HULA takeoff commands at 90 cm
  hover_height_min_m: 0.85    # keep the search hover around 85-90 cm
  camera_pitch_enabled: true  # point HULA camera toward the floor before video/search
  camera_pitch_mode: "DOWN_ABSOLUTE"
  camera_pitch_angle_deg: 90
  # --- Obstacle avoidance (BRIEF: strictly no flying over obstacles) ---
  # The HULA flies at a fixed low height and must go AROUND obstacles horizontally.
  obstacle_avoidance_enabled: true
  obstacle_source: "lidar"    # lidar | map  (lidar = HULA onboard; map = from Challenge 1)
  obstacle_hard_stop_distance_m: 0.05  # emergency hover if closer than 5 cm
  obstacle_slowdown_rules_mps:
    - { distance_m: 0.30, speed_mps: 0.30 }
    - { distance_m: 0.20, speed_mps: 0.20 }
    - { distance_m: 0.10, speed_mps: 0.10 }
  obstacle_clearance_m: 0.3       # inflate obstacles by ~drone radius + buffer
  # --- SEARCH phase: find + snapshot the ground-robot convoy (primary goal) ---
  # Down-facing camera model used to estimate search footprint.
  camera_model: "D430"
  # Use the bounds the mapping drone surveyed (from its map) when available.
  use_map_bounds: false
  # Fallback arena bounds in UWB N/E if no Challenge 1 map is present — MEASURE.
  search_area: { n_min: 0.5, n_max: 9.5, e_min: 0.5, e_max: 4.5 }
  # Leg spacing depends on camera model and flight height; tune onsite for overlap.
  #   D430 ~2.1 m, D450 ~3.6 m. Tighten if you fly higher or want more overlap.
  search_spacing_m: 2.0
  detection_conf: 0.4         # YOLO confidence threshold
  snapshot_cooldown_s: 1.0    # min time between snapshots (real, no target id)
  target_dedup_m: 0.25        # don't re-snapshot same robot within this distance
  do_area_search: true        # lawnmower-search the strip before going to the pad
  sim_camera_footprint_m: 0.35  # dry-run: "see" robots within this radius
  # YOLO weights path on C2 (train separately)
  yolo_weights: "models/robomaster_best.pt"
  snapshot_dir: "output/snapshots"
